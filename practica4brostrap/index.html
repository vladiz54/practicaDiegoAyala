<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clase componentes basicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body> 
<div class="container my-5">
<div class="bg-white p-4 rounded shadow">
<h2 class="mb-4">Panel de Control</h2>

<div class="alert alert-info" role="alert">
Tienes <strong>3 mensajes</strong> nuevos en tu bandeja de entrada.
</div>
<div class="alert alert-success alert-dismissible fade show" role="alert">
¡Tu perfil se ha actualizado correctamente!
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<hr class="my-4">
<!-- Ejemplo de Badges (Insignias) -->
<div class="mb-4">
<h4 class="d-inline-block me-2">Mensajes</h4>
<span class="badge bg-primary">12</span>
<span class="badge rounded-pill bg-danger">Nuevo</span>
<span class="badge bg-warning text-dark">Pendiente</span>
</div>

<hr class="my-4">
<!-- Ejemplo de Botones -->
<div class="d-grid gap-2 d-md-block">
<button class="btn btn-primary" type="button">Enviar Reporte</button>
<button class="btn btn-outline-secondary" type="button">Cancelar</button>
<button class="btn btn-danger" type="button">
Eliminar <span class="badge bg-white text-danger">5</span>
</button>
</div>
</div>
</div>
<!-- JS de Bootstrap (Necesario para que la alerta se cierre) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    
</body>
</html>
